<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crooked Driver Vintage</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: #0B0B0F;
  color: #E8E4DD;
  min-height: 100vh;
  position: relative;
  -webkit-text-size-adjust: 100%;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.sans { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

/* ===== HEADER (mobile-first) ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(170,183,255,0.15);
  position: sticky;
  top: 0;
  z-index: 20;
  backdrop-filter: blur(10px);
  background: rgba(11,11,15,0.92);
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.logo-circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #aab7ff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: rgba(170,183,255,0.05);
  flex-shrink: 0;
}

.logo-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.brand-name {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #aab7ff;
  line-height: 1.1;
}

.brand-sub {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(170,183,255,0.5);
  margin-top: 2px;
}

/* HAMBURGER */
.hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 6px;
  z-index: 25;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: #aab7ff;
  border-radius: 2px;
  transition: all 0.3s ease;
}

.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* MOBILE NAV DRAWER */
.nav {
  position: fixed;
  top: 0;
  right: -280px;
  width: 260px;
  height: 100vh;
  background: rgba(11,11,15,0.97);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(170,183,255,0.12);
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 80px 24px 24px;
  z-index: 22;
  transition: right 0.35s ease;
}

.nav.open { right: 0; }

.nav-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 21;
  display: none;
}

.nav-backdrop.open { display: block; }

.nav-btn {
  padding: 12px 16px;
  background: transparent;
  border: 1px solid transparent;
  color: rgba(232,228,221,0.5);
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.3s ease;
  text-align: left;
  width: 100%;
}

.nav-btn:hover, .nav-btn:active { color: #aab7ff; }
.nav-btn.active {
  background: rgba(170,183,255,0.15);
  border: 1px solid rgba(170,183,255,0.3);
  color: #aab7ff;
}
.nav-btn.logout { color: rgba(239,83,80,0.6); }
.nav-btn.logout:hover { color: #EF5350; }

.hidden-input { display: none; }

/* ===== HERO (mobile-first) ===== */
.hero {
  padding: 40px 16px;
  text-align: center;
  position: relative;
  z-index: 5;
}

.hero-sub {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(170,183,255,0.4);
  margin-bottom: 12px;
}

.hero h1 {
  font-size: 32px;
  font-weight: 600;
  color: #E8E4DD;
  line-height: 1.1;
}

.hero-line {
  width: 50px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #aab7ff, transparent);
  margin: 16px auto 0;
}

/* ===== SECTIONS ===== */
.section {
  position: relative;
  z-index: 5;
  padding: 24px 16px;
}

.section-title {
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #aab7ff;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.title-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(170,183,255,0.3), transparent);
}

/* ===== NEW ARRIVALS ===== */
.arrivals-row {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 12px;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x mandatory;
}

.arrivals-row::-webkit-scrollbar { height: 3px; }
.arrivals-row::-webkit-scrollbar-track { background: transparent; }
.arrivals-row::-webkit-scrollbar-thumb { background: rgba(170,183,255,0.2); border-radius: 2px; }

.arrival-card {
  min-width: 220px;
  background: linear-gradient(165deg, rgba(170,183,255,0.06), rgba(11,11,15,0.95));
  border: 1px solid rgba(170,183,255,0.12);
  border-radius: 8px;
  padding: 16px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  transition: border-color 0.4s ease;
  scroll-snap-align: start;
}

.arrival-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #aab7ff;
  color: #0B0B0F;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 3px 8px;
  border-radius: 2px;
  text-transform: uppercase;
}

.arrival-img-box, .card-img-box {
  width: 100%;
  border-radius: 6px;
  background: rgba(170,183,255,0.04);
  border: 1px solid rgba(170,183,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-bottom: 12px;
}

.arrival-img-box { height: 140px; }
.card-img-box { height: 160px; }

.arrival-img-box img, .card-img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
}

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}

.search-input {
  padding: 10px 14px;
  background: rgba(232,228,221,0.04);
  border: 1px solid rgba(170,183,255,0.12);
  border-radius: 4px;
  color: #E8E4DD;
  font-size: 14px;
  outline: none;
  width: 100%;
}

.search-input:focus { border-color: rgba(170,183,255,0.3); }

.filter-chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid rgba(170,183,255,0.12);
  background: transparent;
  color: rgba(232,228,221,0.4);
  transition: all 0.3s ease;
}

.filter-chip:active { color: #aab7ff; border-color: rgba(170,183,255,0.25); }
.filter-chip.active {
  border-color: #aab7ff;
  background: rgba(170,183,255,0.12);
  color: #aab7ff;
}

.sort-select {
  padding: 10px 14px;
  background: rgba(232,228,221,0.04);
  border: 1px solid rgba(170,183,255,0.12);
  border-radius: 4px;
  color: #E8E4DD;
  font-size: 14px;
  outline: none;
  width: 100%;
}

.sort-select option { background: #14141A; }

/* ===== GRID (mobile: 1 col) ===== */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

.card {
  background: rgba(170,183,255,0.03);
  border: 1px solid rgba(170,183,255,0.1);
  border-radius: 8px;
  padding: 16px;
  transition: border-color 0.3s ease;
}

.watch-brand {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(170,183,255,0.6);
  margin-bottom: 2px;
}

.watch-name {
  font-size: 18px;
  font-weight: 600;
  color: #E8E4DD;
  line-height: 1.2;
  margin-bottom: 2px;
}

.watch-price {
  font-size: 22px;
  color: #aab7ff;
  font-weight: 600;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: rgba(232,228,221,0.4);
  margin-bottom: 4px;
}

.cond-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 2px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.cond-new {
  background: rgba(76,175,80,0.12);
  color: #66BB6A;
  border: 1px solid rgba(76,175,80,0.2);
}

.cond-preowned {
  background: rgba(170,183,255,0.12);
  color: #aab7ff;
  border: 1px solid rgba(170,183,255,0.2);
}

.card-footer {
  margin-top: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.card-actions { display: flex; gap: 6px; }

/* ===== BUTTONS ===== */
.btn-primary {
  padding: 10px 24px;
  background: linear-gradient(135deg, #aab7ff, #8a9aee);
  color: #0B0B0F;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}

.btn-edit {
  padding: 6px 14px;
  background: rgba(170,183,255,0.1);
  color: #aab7ff;
  border: 1px solid rgba(170,183,255,0.2);
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.btn-danger {
  padding: 6px 14px;
  background: rgba(239,83,80,0.1);
  color: #EF5350;
  border: 1px solid rgba(239,83,80,0.2);
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

/* ===== STATS (mobile: 2 col) ===== */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.stat {
  text-align: center;
  padding: 16px 12px;
  background: rgba(170,183,255,0.04);
  border: 1px solid rgba(170,183,255,0.08);
  border-radius: 8px;
}

.stat-num {
  font-size: 28px;
  font-weight: 600;
  color: #aab7ff;
}

.stat-num.small { font-size: 20px; }

.stat-label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(232,228,221,0.35);
  margin-top: 4px;
}

/* ===== ADMIN HEADER ===== */
.admin-header {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 20px;
}

/* ===== LOGIN ===== */
.login-box {
  max-width: 380px;
  margin: 50px auto;
  padding: 28px 20px;
  background: linear-gradient(165deg, rgba(170,183,255,0.06), rgba(11,11,15,0.98));
  border: 1px solid rgba(170,183,255,0.15);
  border-radius: 12px;
  text-align: center;
  position: relative;
  z-index: 5;
}

.login-box h2 {
  font-size: 24px;
  color: #aab7ff;
  margin-top: 16px;
  margin-bottom: 6px;
}

.login-box .sub {
  font-size: 11px;
  color: rgba(232,228,221,0.35);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.login-error {
  color: #EF5350;
  font-size: 13px;
  margin-bottom: 14px;
  padding: 8px 14px;
  background: rgba(239,83,80,0.08);
  border-radius: 4px;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  background: rgba(232,228,221,0.04);
  border: 1px solid rgba(170,183,255,0.15);
  border-radius: 4px;
  color: #E8E4DD;
  font-size: 16px;
  font-family: 'Cormorant Garamond', Georgia, serif;
  outline: none;
  box-sizing: border-box;
  margin-bottom: 14px;
  -webkit-appearance: none;
}

.form-input:focus { border-color: rgba(170,183,255,0.4); }

.form-select {
  width: 100%;
  padding: 12px 14px;
  background: #14141A;
  border: 1px solid rgba(170,183,255,0.15);
  border-radius: 4px;
  color: #E8E4DD;
  font-size: 16px;
  font-family: 'Cormorant Garamond', Georgia, serif;
  outline: none;
  box-sizing: border-box;
  -webkit-appearance: none;
}

/* ===== MODAL (mobile: full-width bottom sheet) ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 50;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.overlay.hidden { display: none; }

.modal {
  background: #14141A;
  border: 1px solid rgba(170,183,255,0.2);
  border-radius: 16px 16px 0 0;
  padding: 24px 20px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.modal h3 {
  font-size: 22px;
  color: #aab7ff;
  margin-bottom: 20px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}

.form-field { margin-bottom: 12px; }

.form-field label {
  display: block;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(170,183,255,0.5);
  margin-bottom: 6px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  margin-top: 4px;
}

.checkbox-row input {
  width: 20px;
  height: 20px;
  accent-color: #aab7ff;
  cursor: pointer;
}

.checkbox-row span {
  font-size: 14px;
  color: rgba(232,228,221,0.6);
}

.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: stretch;
}

.modal-actions button { flex: 1; text-align: center; padding: 12px 16px; }

/* ===== NOTIFICATION ===== */
.notification {
  position: fixed;
  top: 12px;
  left: 16px;
  right: 16px;
  padding: 12px 20px;
  border-radius: 6px;
  font-size: 13px;
  z-index: 100;
  backdrop-filter: blur(10px);
  text-align: center;
  transition: opacity 0.3s ease;
}

.notification.success {
  background: rgba(76,175,80,0.15);
  color: #66BB6A;
  border: 1px solid rgba(76,175,80,0.3);
}

.notification.error {
  background: rgba(239,83,80,0.15);
  color: #EF5350;
  border: 1px solid rgba(239,83,80,0.3);
}

.notification.hidden { display: none; }

/* ===== FOOTER ===== */
.footer {
  padding: 32px 16px;
  border-top: 1px solid rgba(170,183,255,0.08);
  text-align: center;
  position: relative;
  z-index: 5;
}

.footer span {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(170,183,255,0.25);
}

.empty {
  text-align: center;
  padding: 40px 16px;
  color: rgba(232,228,221,0.25);
  font-size: 15px;
}

.watch-svg { opacity: 0.5; }
.view-section { display: none; }
.view-section.active { display: block; }

/* ========================================
   TABLET BREAKPOINT (min-width: 600px)
   ======================================== */
@media (min-width: 600px) {
  .header { padding: 16px 24px; }

  .logo-circle { width: 48px; height: 48px; }
  .brand-name { font-size: 20px; letter-spacing: 3px; }
  .brand-sub { font-size: 10px; letter-spacing: 4px; }

  .hero { padding: 50px 24px; }
  .hero h1 { font-size: 42px; }
  .hero-sub { font-size: 10px; letter-spacing: 6px; }

  .section { padding: 28px 24px; }

  .arrival-card { min-width: 240px; }

  .search-input { width: auto; min-width: 220px; }
  .sort-select { width: auto; min-width: 150px; }

  .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }

  .card { padding: 20px; }
  .card-img-box { height: 180px; }
  .watch-name { font-size: 20px; }
  .watch-price { font-size: 24px; }

  .stats-grid { grid-template-columns: repeat(4, 1fr); }
  .stat-num { font-size: 32px; }
  .stat-num.small { font-size: 24px; }

  .admin-header { flex-direction: row; align-items: center; }

  .login-box { padding: 36px 32px; margin-top: 80px; }
  .login-box h2 { font-size: 28px; }

  .form-grid { grid-template-columns: 1fr 1fr; gap: 0 16px; }

  .overlay { align-items: center; }
  .modal {
    border-radius: 12px;
    width: 90%;
    max-width: 520px;
    padding: 32px;
  }

  .modal-actions { justify-content: flex-end; }
  .modal-actions button { flex: none; }

  .notification {
    left: auto;
    right: 20px;
    top: 20px;
    max-width: 340px;
    text-align: left;
  }
}

/* ========================================
   DESKTOP BREAKPOINT (min-width: 960px)
   ======================================== */
@media (min-width: 960px) {
  .hamburger { display: none; }

  .nav {
    position: static;
    width: auto;
    height: auto;
    background: transparent;
    backdrop-filter: none;
    border-left: none;
    flex-direction: row;
    padding: 0;
    gap: 8px;
  }

  .nav-backdrop { display: none !important; }

  .nav-btn {
    padding: 8px 20px;
    font-size: 12px;
    text-align: center;
    width: auto;
  }

  .header { padding: 20px 32px; }
  .logo-area { gap: 16px; }
  .logo-circle { width: 56px; height: 56px; }
  .brand-name { font-size: 26px; letter-spacing: 4px; }
  .brand-sub { font-size: 11px; letter-spacing: 6px; }

  .hero { padding: 60px 32px; }
  .hero h1 { font-size: 52px; }
  .hero-sub { font-size: 11px; letter-spacing: 8px; }

  .section { padding: 32px 32px; }
  .section-title { font-size: 14px; letter-spacing: 6px; }

  .arrival-card { min-width: 260px; padding: 20px; }

  .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

  .detail-row { font-size: 12px; }

  .footer { padding: 40px 32px; }
  .footer span { font-size: 11px; letter-spacing: 4px; }

  .filter-chip { font-size: 11px; }
  .filter-chip:hover { color: #aab7ff; border-color: rgba(170,183,255,0.25); }
  .card:hover { border-color: rgba(170,183,255,0.25); }
  .arrival-card:hover { border-color: rgba(170,183,255,0.3); }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-edit:hover { background: rgba(170,183,255,0.2); }
  .btn-danger:hover { background: rgba(239,83,80,0.2); }
}
</style>
</head>
<body>

<!-- NOTIFICATION -->
<div id="notification" class="notification sans hidden"></div>

<!-- HEADER -->
<header class="header">
  <div class="logo-area" id="logoArea">
    <div class="logo-circle" id="logoCircle">
      <svg class="watch-svg" id="logoSvg" width="32" height="32" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="26" stroke="#aab7ff" stroke-width="2.5"/>
        <circle cx="32" cy="32" r="22" stroke="#aab7ff" stroke-width="1" opacity="0.4"/>
        <line x1="32" y1="32" x2="32" y2="16" stroke="#aab7ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="44" y2="32" stroke="#aab7ff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="32" cy="32" r="2.5" fill="#aab7ff"/>
      </svg>
      <img id="logoImg" src="" alt="Logo" style="display:none;">
    </div>
    <div>
      <div class="brand-name">Crooked Driver Vintage</div>
      <div class="brand-sub sans">Vintage Watches</div>
    </div>
    <input type="file" accept="image/*" id="logoInput" class="hidden-input">
  </div>
  <button class="hamburger sans" id="hamburgerBtn"><span></span><span></span><span></span></button>
  <div class="nav-backdrop" id="navBackdrop"></div>
  <nav class="nav sans" id="navBar">
    <button class="nav-btn active" data-view="storefront">Collection</button>
    <button class="nav-btn" data-view="login" id="adminBtn">Admin</button>
  </nav>
</header>

<!-- STOREFRONT -->

  <div class="section">

<!-- WATCH DETAIL + INQUIRY MODAL -->
<div id="detailOverlay" class="overlay hidden">
  <div class="modal">
    <div id="detailContent"></div>
    <div style="width:100%;height:1px;background:rgba(170,183,255,0.12);margin:20px 0;"></div>

    <div class="form-field"><label class="sans">Phone</label><input class="form-input" id="inqPhone" type="tel" placeholder="(555) 123-4567"></div>
    <div class="form-field"><label class="sans">Message</label><textarea class="form-input" id="inqMessage" rows="3" placeholder="Any questions or details about this watch..." style="resize:vertical;font-family:'Cormorant Garamond',Georgia,serif;"></textarea></div>
    <div class="modal-actions">
      <button class="btn-edit sans" style="padding:10px 24px;" id="detailClose">Close</button>
      <button class="btn-primary sans" id="inqSubmit">Send Inquiry</button>

</div>

<!-- MODAL -->
<div id="modalOverlay" class="overlay hidden">
  <div class="modal">
    <h3 id="modalTitle">Add New Watch</h3>
    <div class="form-grid">
      <div class="form-field"><label class="sans">Watch Name *</label><input class="form-input" id="fName"></div>
      <div class="form-field"><label class="sans">Brand *</label><input class="form-input" id="fBrand"></div>
      <div class="form-field"><label class="sans">Price ($)</label><input class="form-input" id="fPrice" type="number"></div>
      <div class="form-field"><label class="sans">Year</label><input class="form-input" id="fYear" type="number"></div>
      <div class="form-field"><label class="sans">Movement</label>
        <select class="form-select" id="fMovement"><option>Automatic</option><option>Manual</option><option>Quartz</option></select>
      </div>
      <div class="form-field"><label class="sans">Condition</label>
        <select class="form-select" id="fCondition"><option>New</option><option>Pre-Owned</option><option>Vintage</option></select>
      </div>
      <div class="form-field"><label class="sans">Case Material</label><input class="form-input" id="fCase"></div>
      <div class="form-field"><label class="sans">Dial Color</label><input class="form-input" id="fDial"></div>
    </div>
    <div class="form-field">
      <label class="sans">Watch Image</label>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="btn-edit sans" id="fImageBtn">Choose Image</button>
        <span class="sans" id="fImageLabel" style="font-size:12px;color:rgba(232,228,221,0.4);"></span>
        <input type="file" accept="image/*" id="fImageInput" class="hidden-input">
      </div>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="fNewArrival">
      <span class="sans">Mark as New Arrival</span>
    </div>
    <div class="modal-actions">
      <button class="btn-edit sans" style="padding:10px 24px;" id="modalCancel">Cancel</button>
      <button class="btn-primary sans" id="modalSave">Add to Inventory</button>
    </div>
  </div>
</div>

<script>
var ADMIN_USER = "admin";
var ADMIN_PASS = "admin123";

var inventory = [
  { id: 1, name: "Royal Oak Chronograph", brand: "Audemars Piguet", price: 38500, ref: "CDV-2601", movement: "Automatic", caseMaterial: "Stainless Steel", dialColor: "Blue", condition: "New", year: 2025, isNewArrival: true, image: "" },
  { id: 2, name: "Submariner Date", brand: "Rolex", price: 14200, ref: "CDV-2602", movement: "Automatic", caseMaterial: "Oystersteel", dialColor: "Black", condition: "Pre-Owned", year: 2023, isNewArrival: false, image: "" },
  { id: 3, name: "Speedmaster Moonwatch", brand: "Omega", price: 7100, ref: "CDV-2603", movement: "Manual", caseMaterial: "Stainless Steel", dialColor: "Black", condition: "New", year: 2025, isNewArrival: true, image: "" },
  { id: 4, name: "Nautilus", brand: "Patek Philippe", price: 142000, ref: "CDV-2604", movement: "Automatic", caseMaterial: "Rose Gold", dialColor: "Green", condition: "New", year: 2024, isNewArrival: true, image: "" },
  { id: 5, name: "Santos de Cartier", brand: "Cartier", price: 8950, ref: "CDV-2605", movement: "Automatic", caseMaterial: "Stainless Steel", dialColor: "Silver", condition: "Pre-Owned", year: 2022, isNewArrival: false, image: "" },
  { id: 6, name: "Big Pilot's Watch", brand: "IWC", price: 15600, ref: "CDV-2606", movement: "Automatic", caseMaterial: "Titanium", dialColor: "Blue", condition: "New", year: 2025, isNewArrival: true, image: "" }
];

var isLoggedIn = false;
var currentView = "storefront";
var storeFilter = "all";
var adminFilter = "all";
var storeSearch = "";
var adminSearchTerm = "";
var adminSortBy = "name";
var editingId = null;
var logoUrl = "";
var watchImageData = "";

function $(id) { return document.getElementById(id); }
function formatPrice(p) { return "$" + p.toLocaleString("en-US"); }

// HAMBURGER TOGGLE
function toggleNav() {
  var nav = $("navBar");
  var btn = $("hamburgerBtn");
  var backdrop = $("navBackdrop");
  var isOpen = nav.classList.contains("open");
  if (isOpen) {
    nav.classList.remove("open");
    btn.classList.remove("open");
    backdrop.classList.remove("open");
  } else {
    nav.classList.add("open");
    btn.classList.add("open");
    backdrop.classList.add("open");
  }
}

function closeNav() {
  $("navBar").classList.remove("open");
  $("hamburgerBtn").classList.remove("open");
  $("navBackdrop").classList.remove("open");
}

$("hamburgerBtn").onclick = toggleNav;
$("navBackdrop").onclick = closeNav;

function notify(msg, type) {
  var el = $("notification");
  el.textContent = msg;
  el.className = "notification sans " + (type || "success");
  setTimeout(function() { el.className = "notification sans hidden"; }, 3000);
}

function watchPlaceholderSvg() {
  return '<svg width="48" height="48" viewBox="0 0 64 64" fill="none" style="opacity:0.4;"><circle cx="32" cy="32" r="26" stroke="#aab7ff" stroke-width="2.5"/><line x1="32" y1="32" x2="32" y2="16" stroke="#aab7ff" stroke-width="2" stroke-linecap="round"/><line x1="32" y1="32" x2="44" y2="32" stroke="#aab7ff" stroke-width="1.5" stroke-linecap="round"/><circle cx="32" cy="32" r="2.5" fill="#aab7ff"/></svg>';
}

function condBadgeClass(c) { return c === "New" ? "cond-badge sans cond-new" : "cond-badge sans cond-preowned"; }

function makeCardHTML(w, showAdmin) {
  var imgHTML = w.image ? '<img src="' + w.image + '" alt="' + w.name + '">' : watchPlaceholderSvg();
  var adminBtns = "";
  var clickAttr = "";
  if (showAdmin) {
    adminBtns = '<div class="card-actions"><button class="btn-edit sans" onclick="event.stopPropagation();editWatch(' + w.id + ')">Edit</button><button class="btn-danger sans" onclick="event.stopPropagation();deleteWatch(' + w.id + ')">Delete</button></div>';
  } else {
    clickAttr = ' onclick="openDetail(' + w.id + ')" style="cursor:pointer;"';
  }
  return '<div class="card"' + clickAttr + '>' +
    '<div class="card-img-box">' + imgHTML + '</div>' +
    '<div class="watch-brand sans">' + w.brand + '</div>' +
    '<div class="watch-name">' + w.name + '</div>' +
    '<div class="detail-row sans" style="margin-top:10px;"><span>Ref: ' + w.ref + '</span><span class="' + condBadgeClass(w.condition) + '">' + w.condition + '</span></div>' +
    '<div class="detail-row sans"><span>' + w.movement + '</span><span>' + w.year + '</span></div>' +
    '<div class="detail-row sans"><span>' + w.caseMaterial + '</span><span>' + w.dialColor + ' Dial</span></div>' +
    '<div class="card-footer"><span class="watch-price">' + formatPrice(w.price) + '</span>' + adminBtns + '</div>' +
    '</div>';
}

function makeArrivalHTML(w) {
  var imgHTML = w.image ? '<img src="' + w.image + '" alt="' + w.name + '">' : watchPlaceholderSvg();
  return '<div class="arrival-card" onclick="openDetail(' + w.id + ')" style="cursor:pointer;">' +
    '<div class="arrival-badge sans">Just In</div>' +
    '<div class="arrival-img-box">' + imgHTML + '</div>' +
    '<div class="watch-brand sans">' + w.brand + '</div>' +
    '<div class="watch-name" style="font-size:18px;">' + w.name + '</div>' +
    '<div class="detail-row sans" style="margin-top:8px;"><span>' + w.movement + ' &middot; ' + w.year + '</span></div>' +
    '<div class="watch-price" style="font-size:20px;margin-top:10px;">' + formatPrice(w.price) + '</div>' +
    '</div>';
}

function filterList(list, filterType, search) {
  return list.filter(function(w) {
    if (filterType === "new-arrivals" && !w.isNewArrival) return false;
    if (filterType === "pre-owned" && w.condition !== "Pre-Owned") return false;
    if (filterType === "new" && w.condition !== "New") return false;
    if (search) {
      var s = search.toLowerCase();
      if (w.name.toLowerCase().indexOf(s) === -1 && w.brand.toLowerCase().indexOf(s) === -1 && w.ref.toLowerCase().indexOf(s) === -1) return false;
    }
    return true;
  });
}

function sortList(list, sortBy) {
  return list.slice().sort(function(a, b) {
    if (sortBy === "price-asc") return a.price - b.price;
    if (sortBy === "price-desc") return b.price - a.price;
    if (sortBy === "year") return b.year - a.year;
    return a.name.localeCompare(b.name);
  });
}

function renderStorefront() {
  // New arrivals
  var arrivals = inventory.filter(function(w) { return w.isNewArrival; });
  var arrivalsSection = $("newArrivalsSection");
  var arrivalsRow = $("arrivalsRow");
  if (arrivals.length > 0) {
    arrivalsSection.style.display = "";
    arrivalsRow.innerHTML = arrivals.map(function(w) { return makeArrivalHTML(w); }).join("");
  } else {
    arrivalsSection.style.display = "none";
  }

  // Full grid
  var filtered = sortList(filterList(inventory, storeFilter, storeSearch), "name");
  var grid = $("storeGrid");
  grid.innerHTML = filtered.map(function(w) { return makeCardHTML(w, false); }).join("");
  $("storeEmpty").style.display = filtered.length === 0 ? "" : "none";
  $("footerText").textContent = "Crooked Driver Vintage \u00B7 " + inventory.length + " Timepieces in Collection";
}

function renderAdmin() {
  // Stats
  var newCount = inventory.filter(function(w) { return w.isNewArrival; }).length;
  var preOwned = inventory.filter(function(w) { return w.condition === "Pre-Owned"; }).length;
  var totalVal = inventory.reduce(function(s, w) { return s + w.price; }, 0);
  $("statsGrid").innerHTML =
    '<div class="stat"><div class="stat-num">' + inventory.length + '</div><div class="stat-label sans">Total Watches</div></div>' +
    '<div class="stat"><div class="stat-num">' + newCount + '</div><div class="stat-label sans">New Arrivals</div></div>' +
    '<div class="stat"><div class="stat-num">' + preOwned + '</div><div class="stat-label sans">Pre-Owned</div></div>' +
    '<div class="stat"><div class="stat-num small">' + formatPrice(totalVal) + '</div><div class="stat-label sans">Total Value</div></div>';

  // Grid
  var filtered = sortList(filterList(inventory, adminFilter, adminSearchTerm), adminSortBy);
  $("adminGrid").innerHTML = filtered.map(function(w) { return makeCardHTML(w, true); }).join("");
  $("adminEmpty").style.display = filtered.length === 0 ? "" : "none";
}

function switchView(view) {
  closeNav();
  currentView = view;
  document.querySelectorAll(".view-section").forEach(function(el) { el.classList.remove("active"); });
  $("view-" + view).classList.add("active");

  document.querySelectorAll(".nav-btn").forEach(function(btn) { btn.classList.remove("active"); });
  var activeBtn = document.querySelector('.nav-btn[data-view="' + view + '"]');
  if (activeBtn) activeBtn.classList.add("active");

  if (view === "storefront") renderStorefront();
  if (view === "admin") renderAdmin();
}

function updateNav() {
  var nav = $("navBar");
  if (isLoggedIn) {
    nav.innerHTML =
      '<button class="nav-btn active" data-view="storefront">Collection</button>' +
      '<button class="nav-btn" data-view="admin">Inventory</button>' +
      '<button class="nav-btn logout" id="logoutBtn">Logout</button>';
    $("logoutBtn").onclick = function() {
      isLoggedIn = false;
      updateNav();
      switchView("storefront");
    };
  } else {
    nav.innerHTML =
      '<button class="nav-btn active" data-view="storefront">Collection</button>' +
      '<button class="nav-btn" data-view="login" id="adminBtn">Admin</button>';
  }
  nav.querySelectorAll(".nav-btn[data-view]").forEach(function(btn) {
    btn.onclick = function() { switchView(btn.getAttribute("data-view")); };
  });
}

// LOGIN
$("loginBtn").onclick = function() {
  var user = $("loginUser").value;
  var pass = $("loginPass").value;
  if (user === ADMIN_USER && pass === ADMIN_PASS) {
    isLoggedIn = true;
    $("loginError").style.display = "none";
    $("loginUser").value = "";
    $("loginPass").value = "";
    updateNav();
    switchView("admin");
    notify("Welcome back, Admin");
  } else {
    $("loginError").textContent = "Invalid credentials";
    $("loginError").style.display = "";
  }
};

$("loginPass").onkeydown = function(e) { if (e.key === "Enter") $("loginBtn").click(); };

// LOGO UPLOAD
$("logoArea").onclick = function() { $("logoInput").click(); };
$("logoInput").onchange = function(e) {
  var file = e.target.files[0];
  if (file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      logoUrl = ev.target.result;
      $("logoSvg").style.display = "none";
      $("logoImg").src = logoUrl;
      $("logoImg").style.display = "";
    };
    reader.readAsDataURL(file);
  }
};

// STORE FILTERS
document.querySelectorAll("[data-filter]").forEach(function(btn) {
  btn.onclick = function() {
    document.querySelectorAll("[data-filter]").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    storeFilter = btn.getAttribute("data-filter");
    renderStorefront();
  };
});

$("storeSearch").oninput = function() {
  storeSearch = this.value;
  renderStorefront();
};

// ADMIN FILTERS
document.querySelectorAll("[data-admin-filter]").forEach(function(btn) {
  btn.onclick = function() {
    document.querySelectorAll("[data-admin-filter]").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    adminFilter = btn.getAttribute("data-admin-filter");
    renderAdmin();
  };
});

$("adminSearch").oninput = function() {
  adminSearchTerm = this.value;
  renderAdmin();
};

$("adminSort").onchange = function() {
  adminSortBy = this.value;
  renderAdmin();
};

// MODAL
function openModal(watch) {
  editingId = watch ? watch.id : null;
  $("modalTitle").textContent = watch ? "Edit Watch" : "Add New Watch";
  $("modalSave").textContent = watch ? "Update Watch" : "Add to Inventory";
  $("fName").value = watch ? watch.name : "";
  $("fBrand").value = watch ? watch.brand : "";
  $("fPrice").value = watch ? watch.price : 0;
  $("fYear").value = watch ? watch.year : 2025;
  $("fMovement").value = watch ? watch.movement : "Automatic";
  $("fCondition").value = watch ? watch.condition : "New";
  $("fCase").value = watch ? watch.caseMaterial : "";
  $("fDial").value = watch ? watch.dialColor : "";
  $("fNewArrival").checked = watch ? watch.isNewArrival : false;
  watchImageData = watch ? watch.image : "";
  $("fImageLabel").textContent = watchImageData ? "Image uploaded" : "";
  $("modalOverlay").classList.remove("hidden");
}

function closeModal() {
  $("modalOverlay").classList.add("hidden");
  editingId = null;
  watchImageData = "";
}

$("addWatchBtn").onclick = function() { openModal(null); };
$("modalCancel").onclick = closeModal;
$("modalOverlay").onclick = function(e) { if (e.target === this) closeModal(); };

$("fImageBtn").onclick = function() { $("fImageInput").click(); };
$("fImageInput").onchange = function(e) {
  var file = e.target.files[0];
  if (file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      watchImageData = ev.target.result;
      $("fImageLabel").textContent = "Image uploaded";
    };
    reader.readAsDataURL(file);
  }
};

$("modalSave").onclick = function() {
  var name = $("fName").value.trim();
  var brand = $("fBrand").value.trim();
  if (!name || !brand) { notify("Name and Brand are required", "error"); return; }

  if (editingId) {
    for (var i = 0; i < inventory.length; i++) {
      if (inventory[i].id === editingId) {
        inventory[i].name = name;
        inventory[i].brand = brand;
        inventory[i].price = Number($("fPrice").value) || 0;
        inventory[i].year = Number($("fYear").value) || 2025;
        inventory[i].movement = $("fMovement").value;
        inventory[i].condition = $("fCondition").value;
        inventory[i].caseMaterial = $("fCase").value;
        inventory[i].dialColor = $("fDial").value;
        inventory[i].isNewArrival = $("fNewArrival").checked;
        if (watchImageData) inventory[i].image = watchImageData;
        break;
      }
    }
    notify("Watch updated successfully");
  } else {
    var maxId = 0;
    for (var j = 0; j < inventory.length; j++) { if (inventory[j].id > maxId) maxId = inventory[j].id; }
    var newId = maxId + 1;
    inventory.push({
      id: newId,
      name: name,
      brand: brand,
      price: Number($("fPrice").value) || 0,
      ref: "CDV-" + (2600 + newId),
      movement: $("fMovement").value,
      caseMaterial: $("fCase").value,
      dialColor: $("fDial").value,
      condition: $("fCondition").value,
      year: Number($("fYear").value) || 2025,
      isNewArrival: $("fNewArrival").checked,
      image: watchImageData
    });
    notify("Watch added to inventory");
  }
  closeModal();
  renderAdmin();
  renderStorefront();
};

// GLOBAL FUNCTIONS FOR INLINE ONCLICK
window.editWatch = function(id) {
  var w = null;
  for (var i = 0; i < inventory.length; i++) { if (inventory[i].id === id) { w = inventory[i]; break; } }
  if (w) openModal(w);
};

window.deleteWatch = function(id) {
  inventory = inventory.filter(function(w) { return w.id !== id; });
  notify("Watch removed from inventory");
  renderAdmin();
  renderStorefront();
};

// WATCH DETAIL + INQUIRY
var detailWatchId = null;

window.openDetail = function(id) {
  var w = null;
  for (var i = 0; i < inventory.length; i++) { if (inventory[i].id === id) { w = inventory[i]; break; } }
  if (!w) return;
  detailWatchId = id;
  var imgHTML = w.image ? '<img src="' + w.image + '" alt="' + w.name + '" style="width:100%;height:220px;object-fit:cover;border-radius:6px;margin-bottom:16px;">' : '<div style="width:100%;height:180px;border-radius:6px;background:rgba(170,183,255,0.04);border:1px solid rgba(170,183,255,0.08);display:flex;align-items:center;justify-content:center;margin-bottom:16px;">' + watchPlaceholderSvg() + '</div>';
  $("detailContent").innerHTML =
    imgHTML +
    '<div class="watch-brand sans" style="margin-bottom:4px;">' + w.brand + '</div>' +
    '<div class="watch-name" style="font-size:24px;margin-bottom:8px;">' + w.name + '</div>' +
    '<div class="watch-price" style="margin-bottom:16px;">' + formatPrice(w.price) + '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;">' +
      '<div class="detail-row sans"><span style="color:rgba(170,183,255,0.5);">Reference</span><span>' + w.ref + '</span></div>' +
      '<div class="detail-row sans"><span style="color:rgba(170,183,255,0.5);">Condition</span><span>' + w.condition + '</span></div>' +
      '<div class="detail-row sans"><span style="color:rgba(170,183,255,0.5);">Movement</span><span>' + w.movement + '</span></div>' +
      '<div class="detail-row sans"><span style="color:rgba(170,183,255,0.5);">Year</span><span>' + w.year + '</span></div>' +
      '<div class="detail-row sans"><span style="color:rgba(170,183,255,0.5);">Case</span><span>' + w.caseMaterial + '</span></div>' +
      '<div class="detail-row sans"><span style="color:rgba(170,183,255,0.5);">Dial</span><span>' + w.dialColor + '</span></div>' +
    '</div>';
  // Clear inquiry form
  $("inqName").value = "";
  $("inqEmail").value = "";
  $("inqPhone").value = "";
  $("inqMessage").value = "";
  $("detailOverlay").classList.remove("hidden");
};

function closeDetail() {
  $("detailOverlay").classList.add("hidden");
  detailWatchId = null;
}

$("detailClose").onclick = closeDetail;
$("detailOverlay").onclick = function(e) { if (e.target === this) closeDetail(); };

$("inqSubmit").onclick = function() {
  var name = $("inqName").value.trim();
  var email = $("inqEmail").value.trim();
  if (!name || !email) {
    notify("Please enter your name and email", "error");
    return;
  }
  // Find watch name for the notification
  var watchName = "";
  for (var i = 0; i < inventory.length; i++) {
    if (inventory[i].id === detailWatchId) { watchName = inventory[i].name; break; }
  }
  notify("Inquiry sent for " + watchName + "! We'll be in touch.");
  closeDetail();
};

// NAV SETUP
document.querySelectorAll(".nav-btn[data-view]").forEach(function(btn) {
  btn.onclick = function() { switchView(btn.getAttribute("data-view")); };
});

// INITIAL RENDER
renderStorefront();
</script>
</body>
</html>
